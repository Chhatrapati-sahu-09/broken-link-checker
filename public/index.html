<!doctype html>
<html>
  <head>
    <title>Broken Link Checker</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>🔗 Broken Link Checker</h1>

      <!-- Input -->
      <div class="input-box">
        <input type="text" id="urlInput" placeholder="Enter website URL..." />
        <button onclick="scanLinks()">Scan</button>
        <button onclick="toggleDarkMode()">🌙</button>
      </div>

      <!-- Loader -->
      <div id="loader">🔄 Scanning...</div>

      <!-- Stats -->
      <div id="stats" class="card"></div>

      <!-- Search -->
      <input
        type="text"
        id="searchInput"
        placeholder="Search URL..."
        onkeyup="searchLinks()"
      />

      <!-- Filters -->
      <div class="filters">
        <button onclick="filterLinks('ALL')">All</button>
        <button onclick="filterLinks('WORKING')">Working</button>
        <button onclick="filterLinks('BROKEN')">Broken</button>
        <button onclick="filterLinks('REDIRECT')">Redirect</button>
      </div>

      <!-- Table -->
      <table id="resultTable">
        <thead>
          <tr>
            <th>URL</th>
            <th>Status</th>
            <th>Type</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <!-- Export -->
      <button onclick="downloadJSON()">Download Report</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
